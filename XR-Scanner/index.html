<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environment Mesh Detector</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
        width: 100%;
      }
      body {
        background: #000;
      }
      #log {
        position: fixed;
        top: 10px;
        left: 10px;
        color: #0f0;
        font-size: 11px;
        z-index: 100;
        max-width: 450px;
        max-height: 350px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.9);
        padding: 8px;
        border: 1px solid #0f0;
        font-family: monospace;
        font-weight: bold;
      }
      .line {
        margin: 1px 0;
      }
    </style>
  </head>
  <body>
    <div id="log">INITIALIZING...</div>

    <a-scene
      xr-mode-ui="XRMode: xr"
      renderer="alpha: true; antialias: true; precision: high"
      webxr="referenceSpaceType: local-floor; optionalFeatures: hit-test"
    >
      <a-light type="ambient" color="white" intensity="1"></a-light>
      <a-light
        type="directional"
        color="white"
        intensity="1"
        position="5 10 5"
      ></a-light>

      <a-entity id="meshes"></a-entity>

      <!-- Finish Scan Button -->
      <a-entity
        id="finish-button"
        position="0 0.8 -1"
        geometry="primitive: box; width: 0.4; height: 0.3; depth: 0.1"
        material="color: #00FF00; emissive: #00FF00; opacity: 1"
        finish-scan-button=""
        visible="false"
      >
        <a-text
          value="FINISH SCAN"
          align="center"
          anchor="center"
          position="0 0 0.06"
          width="1.2"
          color="#000"
          font-size="40"
        ></a-text>
      </a-entity>

      <a-entity camera position="0 1.6 0"></a-entity>

      <!-- Left Controller with Raycast -->
      <a-entity
        id="left-hand"
        oculus-touch-controls="hand: left"
        raycaster="objects: #finish-button"
        line="color: #0F0; opacity: 0; fromPoint: 0,0,0; toPoint: 0,0,-1"
      ></a-entity>

      <!-- Right Controller with Raycast -->
      <a-entity
        id="right-hand"
        oculus-touch-controls="hand: right"
        raycaster="objects: #finish-button"
        line="color: #0F0; opacity: 0; fromPoint: 0,0,0; toPoint: 0,0,-1"
      ></a-entity>
    </a-scene>

    <script>
      // Register finish button component
      AFRAME.registerComponent("finish-scan-button", {
        init: function () {
          this.isPressed = false;
          this.isIntersecting = false; // Track if raycast intersects
          const self = this;
          this.scene = this.el.sceneEl;

          // Wait for scene to load
          if (!this.scene.hasLoaded) {
            this.scene.addEventListener("loaded", () => this.setupListeners());
          } else {
            this.setupListeners();
          }
        },

        setupListeners: function () {
          const self = this;
          const leftHand = document.getElementById("left-hand");
          const rightHand = document.getElementById("right-hand");

          // Track intersection state
          self.el.addEventListener("raycaster-intersected", function (e) {
            console.log("✓ Raycast hit finish button");
            self.isIntersecting = true;
            self.highlight();
          });

          self.el.addEventListener(
            "raycaster-intersected-cleared",
            function () {
              console.log("✗ Raycast left finish button");
              self.isIntersecting = false;
              self.resetColor();
            },
          );

          // Setup left hand trigger
          if (leftHand) {
            leftHand.addEventListener("triggerdown", () => {
              console.log(
                "Left trigger pressed, intersecting:",
                self.isIntersecting,
              );
              if (self.isIntersecting && !self.isPressed) {
                self.isPressed = true;
                self.onButtonPressed();
              }
            });
            leftHand.addEventListener("triggerup", () => {
              self.isPressed = false;
            });
          }

          // Setup right hand trigger
          if (rightHand) {
            rightHand.addEventListener("triggerdown", () => {
              console.log(
                "Right trigger pressed, intersecting:",
                self.isIntersecting,
              );
              if (self.isIntersecting && !self.isPressed) {
                self.isPressed = true;
                self.onButtonPressed();
              }
            });
            rightHand.addEventListener("triggerup", () => {
              self.isPressed = false;
            });
          }
        },

        highlight: function () {
          this.el.setAttribute("material", "color: #00FFFF");
        },

        resetColor: function () {
          if (!this.isPressed) {
            this.el.setAttribute("material", "color: #00FF00");
          }
        },

        onButtonPressed: function () {
          console.log("🎯 FINISH SCAN BUTTON PRESSED - Redirecting to VR!");
          this.el.setAttribute("material", "color: #00DD00");

          const self = this;
          setTimeout(() => {
            self.el.setAttribute("material", "color: #00FF00");
            setTimeout(() => {
              console.log("→ Navigating to /VR/");
              window.location.href = "/VR/";
            }, 300);
          }, 500);
        },
      });

      // Ultra-simple mesh detector
      class MeshDetector {
        constructor() {
          this.scene = document.querySelector("a-scene");
          this.log("Detector created");
          this.init();
        }

        init() {
          this.scene.addEventListener("enter-vr", () => this.onEnterVR());
          this.scene.addEventListener("exit-vr", () => this.onExitVR());
          this.log("Listeners attached");
        }

        async onEnterVR() {
          this.log("VR ENTERED");
          await new Promise((r) => setTimeout(r, 100));

          // Show finish button
          const finishButton = document.getElementById("finish-button");
          if (finishButton) {
            finishButton.setAttribute("visible", "true");
            this.log("✓ Finish button shown");
          }

          const renderer = this.scene.renderer;
          if (!renderer || !renderer.xr) {
            this.log("✗ No renderer.xr");
            return;
          }

          const session = renderer.xr.getSession?.();
          if (!session) {
            this.log("✗ No session");
            return;
          }

          this.log("✓ Session got");

          // Get spaces
          let viewerSpace, refSpace;
          try {
            viewerSpace = await session.requestReferenceSpace("viewer");
            this.log("✓ Viewer space");
          } catch (e) {
            this.log("✗ Viewer space: " + e.message);
            return;
          }

          try {
            refSpace = await session.requestReferenceSpace("local-floor");
            this.log("✓ Floor space");
          } catch {
            this.log("❌ No floor, trying viewer");
            refSpace = viewerSpace;
          }

          // Get hit test
          let hitTestSource;
          try {
            hitTestSource = await session.requestHitTestSource({
              space: viewerSpace,
            });
            this.log("✓ Hit test ready");
          } catch (e) {
            this.log("✗ Hit test: " + e.message);
            return;
          }

          // Start loop
          let count = 0;
          const detected = new Set();
          const gridPoints = new Map(); // Store grid points
          const GRID_SIZE = 0.25; // Grid spacing in meters
          const connections = new Set(); // Store drawn connections

          const snapToGrid = (pos) => {
            return Math.round(pos / GRID_SIZE) * GRID_SIZE;
          };

          const drawLine = (p1, p2) => {
            const lineKey = [Math.min(p1, p2), Math.max(p1, p2)].join("|");
            if (connections.has(lineKey)) return;
            connections.add(lineKey);

            const [x1, y1, z1] = p1.split(",").map(Number);
            const [x2, y2, z2] = p2.split(",").map(Number);

            const dx = x2 - x1;
            const dy = y2 - y1;
            const dz = z2 - z1;
            const length = Math.sqrt(dx * dx + dy * dy + dz * dz);

            if (length < 0.001) return;

            const line = document.createElement("a-entity");
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;
            const midZ = (z1 + z2) / 2;

            line.setAttribute("position", `${midX} ${midY} ${midZ}`);

            const cyl = document.createElement("a-cylinder");
            cyl.setAttribute("radius", "0.01");
            cyl.setAttribute("height", length);
            cyl.setAttribute("color", "#00FF00");
            cyl.setAttribute("opacity", "0.6");

            const rotAxis = new THREE.Vector3(dy, -dx, 0).normalize();
            const angle = Math.acos(dz / length) * (180 / Math.PI);
            cyl.setAttribute(
              "rotation",
              `${angle * rotAxis.x} ${angle * rotAxis.y} 0`,
            );

            line.appendChild(cyl);
            document.getElementById("meshes").appendChild(line);
          };

          const drawFace = (p1, p2, p3, p4, plane) => {
            const faceKey = [p1, p2, p3, p4].sort().join(":");
            if (connections.has(faceKey)) return;
            connections.add(faceKey);

            const [x1, y1, z1] = p1.split(",").map(Number);
            const [x2, y2, z2] = p2.split(",").map(Number);
            const [x3, y3, z3] = p3.split(",").map(Number);
            const [x4, y4, z4] = p4.split(",").map(Number);

            const centerX = (x1 + x2 + x3 + x4) / 4;
            const centerY = (y1 + y2 + y3 + y4) / 4;
            const centerZ = (z1 + z2 + z3 + z4) / 4;

            const face = document.createElement("a-entity");
            face.setAttribute("position", `${centerX} ${centerY} ${centerZ}`);

            const planeEl = document.createElement("a-plane");
            planeEl.setAttribute("width", GRID_SIZE);
            planeEl.setAttribute("height", GRID_SIZE);
            planeEl.setAttribute("color", "#00FF00");
            planeEl.setAttribute("opacity", "0.2");
            planeEl.setAttribute("side", "double");

            // Apply rotation based on plane orientation
            if (plane === "XZ") {
              planeEl.setAttribute("rotation", "90 0 0");
            } else if (plane === "YZ") {
              planeEl.setAttribute("rotation", "0 90 0");
            }
            // XY plane needs no rotation (default)

            face.appendChild(planeEl);
            document.getElementById("meshes").appendChild(face);
          };

          const tryCreateFace = (p1, p2, p3, p4, plane) => {
            // Vérifier que tous les 4 points existent et que les 4 arêtes existent
            if (
              !gridPoints.has(p1) ||
              !gridPoints.has(p2) ||
              !gridPoints.has(p3) ||
              !gridPoints.has(p4)
            )
              return;

            const edge1 = [Math.min(p1, p2), Math.max(p1, p2)].join("|");
            const edge2 = [Math.min(p2, p4), Math.max(p2, p4)].join("|");
            const edge3 = [Math.min(p4, p3), Math.max(p4, p3)].join("|");
            const edge4 = [Math.min(p3, p1), Math.max(p3, p1)].join("|");

            if (
              connections.has(edge1) &&
              connections.has(edge2) &&
              connections.has(edge3) &&
              connections.has(edge4)
            ) {
              drawFace(p1, p2, p3, p4, plane);
            }
          };

          const loop = (time, frame) => {
            count++;

            if (!hitTestSource) {
              session.requestAnimationFrame(loop);
              return;
            }
            const results = frame.getHitTestResults(hitTestSource);

            if (results.length > 0) {
              const pose = results[0].getPose(refSpace);
              if (pose) {
                const x = pose.transform.position.x;
                const y = pose.transform.position.y;
                const z = pose.transform.position.z;

                // Snap to grid
                const gridX = snapToGrid(x);
                const gridY = snapToGrid(y);
                const gridZ = snapToGrid(z);
                const key = `${gridX},${gridY},${gridZ}`;

                if (!detected.has(key)) {
                  detected.add(key);
                  gridPoints.set(key, { x: gridX, y: gridY, z: gridZ });
                  this.addBox(gridX, gridY, gridZ);

                  // Connect to adjacent points
                  const adjacentKeys = [
                    `${gridX + GRID_SIZE},${gridY},${gridZ}`,
                    `${gridX - GRID_SIZE},${gridY},${gridZ}`,
                    `${gridX},${gridY + GRID_SIZE},${gridZ}`,
                    `${gridX},${gridY - GRID_SIZE},${gridZ}`,
                    `${gridX},${gridY},${gridZ + GRID_SIZE}`,
                    `${gridX},${gridY},${gridZ - GRID_SIZE}`,
                  ];

                  adjacentKeys.forEach((adjKey) => {
                    if (gridPoints.has(adjKey)) {
                      drawLine(key, adjKey);
                    }
                  });

                  // Try to create faces in ALL directions
                  const g = GRID_SIZE;
                  // XY planes (Z constant)
                  tryCreateFace(
                    key,
                    `${gridX + g},${gridY},${gridZ}`,
                    `${gridX + g},${gridY + g},${gridZ}`,
                    `${gridX},${gridY + g},${gridZ}`,
                    "XY",
                  );
                  tryCreateFace(
                    key,
                    `${gridX - g},${gridY},${gridZ}`,
                    `${gridX - g},${gridY + g},${gridZ}`,
                    `${gridX},${gridY + g},${gridZ}`,
                    "XY",
                  );
                  tryCreateFace(
                    key,
                    `${gridX + g},${gridY},${gridZ}`,
                    `${gridX + g},${gridY - g},${gridZ}`,
                    `${gridX},${gridY - g},${gridZ}`,
                    "XY",
                  );
                  tryCreateFace(
                    key,
                    `${gridX - g},${gridY},${gridZ}`,
                    `${gridX - g},${gridY - g},${gridZ}`,
                    `${gridX},${gridY - g},${gridZ}`,
                    "XY",
                  );

                  // XZ planes (Y constant)
                  tryCreateFace(
                    key,
                    `${gridX + g},${gridY},${gridZ}`,
                    `${gridX + g},${gridY},${gridZ + g}`,
                    `${gridX},${gridY},${gridZ + g}`,
                    "XZ",
                  );
                  tryCreateFace(
                    key,
                    `${gridX - g},${gridY},${gridZ}`,
                    `${gridX - g},${gridY},${gridZ + g}`,
                    `${gridX},${gridY},${gridZ + g}`,
                    "XZ",
                  );
                  tryCreateFace(
                    key,
                    `${gridX + g},${gridY},${gridZ}`,
                    `${gridX + g},${gridY},${gridZ - g}`,
                    `${gridX},${gridY},${gridZ - g}`,
                    "XZ",
                  );
                  tryCreateFace(
                    key,
                    `${gridX - g},${gridY},${gridZ}`,
                    `${gridX - g},${gridY},${gridZ - g}`,
                    `${gridX},${gridY},${gridZ - g}`,
                    "XZ",
                  );

                  // YZ planes (X constant)
                  tryCreateFace(
                    key,
                    `${gridX},${gridY + g},${gridZ}`,
                    `${gridX},${gridY + g},${gridZ + g}`,
                    `${gridX},${gridY},${gridZ + g}`,
                    "YZ",
                  );
                  tryCreateFace(
                    key,
                    `${gridX},${gridY - g},${gridZ}`,
                    `${gridX},${gridY - g},${gridZ + g}`,
                    `${gridX},${gridY},${gridZ + g}`,
                    "YZ",
                  );
                  tryCreateFace(
                    key,
                    `${gridX},${gridY + g},${gridZ}`,
                    `${gridX},${gridY + g},${gridZ - g}`,
                    `${gridX},${gridY},${gridZ - g}`,
                    "YZ",
                  );
                  tryCreateFace(
                    key,
                    `${gridX},${gridY - g},${gridZ}`,
                    `${gridX},${gridY - g},${gridZ - g}`,
                    `${gridX},${gridY},${gridZ - g}`,
                    "YZ",
                  );

                  if (detected.size % 5 === 0) {
                    this.log(`✓ ${detected.size} meshes`);
                  }
                }
              }
            }

            if (count === 1) {
              this.log("🔍 Scanning...");
            }

            // CRITICAL FIX: Re-register for next frame
            session.requestAnimationFrame(loop);
          };

          session.requestAnimationFrame(loop);
        }

        addBox(x, y, z) {
          const entity = document.createElement("a-entity");
          entity.setAttribute(
            "position",
            `${x.toFixed(2)} ${y.toFixed(2)} ${z.toFixed(2)}`,
          );

          const box = document.createElement("a-box");
          box.setAttribute("width", "0.05");
          box.setAttribute("height", "0.05");
          box.setAttribute("depth", "0.05");
          box.setAttribute("color", "#00FF00");
          box.setAttribute("emissive", "#00FF00");
          box.setAttribute("opacity", "0.8");

          entity.appendChild(box);
          document.getElementById("meshes").appendChild(entity);
        }

        onExitVR() {
          this.log("Exit VR");
          document.getElementById("meshes").innerHTML = "";
        }

        log(m) {
          console.log(m);
          const div = document.getElementById("log");
          const line = document.createElement("div");
          line.className = "line";
          line.textContent = m;
          line.style.color = m.includes("✓")
            ? "#0f0"
            : m.includes("✗")
              ? "#f00"
              : "#0ff";
          div.insertBefore(line, div.firstChild);
          while (div.children.length > 20) div.removeChild(div.lastChild);
        }
      }

      new MeshDetector();
    </script>
  </body>
</html>
